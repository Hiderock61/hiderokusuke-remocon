<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ヒデロクスケ・リモコン v0.1.1</title>
  <style>
    :root {
      --bg:#f2f2f7; --text:#1c1c1e; --sub:#636366; --card:#fff; --border:#e5e5ea;
      --primary:#0071e3; --primary-dark:#0060c7; --shadow:0 2px 10px rgba(0,0,0,.07);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
      background:var(--bg); color:var(--text); line-height:1.55; min-height:100dvh;
      padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));
    }
    #app { max-width:480px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; padding:10px 16px; background:var(--bg); position:sticky; top:0; z-index:10; border-bottom:1px solid var(--border); }
    header.hidden { display:none; }
    .back-btn { background:none; border:none; color:var(--primary); font-size:15px; font-weight:700; padding:8px 12px 8px 0; min-height:44px; }
    .breadcrumb { font-size:13px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    main { flex:1; padding:20px 16px 0; }
    .screen { display:none; animation:fadeIn .22s ease; }
    .screen.active { display:block; }
    .top-header { text-align:center; margin-bottom:22px; }
    .top-title { font-size:23px; font-weight:900; letter-spacing:-.5px; }
    .top-subtitle { font-size:14px; color:var(--sub); margin-top:6px; font-weight:650; }
    .handy-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .handy-btn {
      display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end; gap:10px;
      padding:16px; background:var(--card); border:1.5px solid var(--border); border-radius:18px;
      min-height:112px; box-shadow:var(--shadow); cursor:pointer; position:relative; overflow:hidden;
    }
    .handy-btn:active { transform:scale(.96); opacity:.85; }
    .handy-btn::before { content:""; position:absolute; top:0; left:0; width:5px; height:100%; background:#aaa; }
    .handy-btn[data-id="ひでGPT"]::before { background:#cc5de8; }
    .handy-btn[data-id="明智君"]::before { background:#339af0; }
    .handy-btn[data-id="体感"]::before { background:#ff922b; }
    .handy-btn[data-id="現実君"]::before { background:#868e96; }
    .handy-btn[data-id="燃料線"]::before { background:#fcc419; }
    .handy-btn[data-id="夢ベクトル"]::before { background:#845ef7; }
    .handy-btn[data-id="停止"]::before { background:#ff6b6b; }
    .handy-btn[data-id="ヤスリ"]::before { background:#20c997; }
    .handy-icon { font-size:34px; line-height:1; }
    .handy-label { font-size:14px; font-weight:800; line-height:1.35; text-align:left; }
    .top-footer { margin-top:28px; text-align:center; font-size:11px; color:#aeaeb2; letter-spacing:.2px; }
    .result-title { font-size:21px; font-weight:850; margin-bottom:16px; text-align:center; }
    .result-container { display:flex; flex-direction:column; gap:14px; }
    .prompt-box { background:var(--card); padding:20px; border-radius:18px; border:1.5px solid var(--border); font-size:15px; line-height:1.75; white-space:pre-wrap; min-height:180px; box-shadow:var(--shadow); color:#3a3a3c; }
    .copy-btn { background:var(--primary); color:#fff; border:none; border-radius:28px; padding:18px; font-size:17px; font-weight:800; min-height:56px; box-shadow:0 4px 14px rgba(0,113,227,.28); }
    .copy-btn:active { transform:scale(.97); background:var(--primary-dark); }
    .ai-links-section { display:flex; flex-direction:column; gap:10px; padding-top:2px; }
    .ai-links-label { font-size:13px; color:var(--sub); text-align:center; }
    .ai-links-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ai-link-btn { display:flex; align-items:center; justify-content:center; gap:6px; padding:0 12px; min-height:48px; background:var(--card); border:1.5px solid var(--border); border-radius:14px; font-size:14px; font-weight:700; color:var(--text); text-decoration:none; box-shadow:var(--shadow); }
    .toast { position:fixed; bottom:calc(32px + env(safe-area-inset-bottom,0px)); left:50%; transform:translateX(-50%); background:rgba(28,28,30,.88); color:#fff; padding:12px 22px; border-radius:24px; font-size:14px; z-index:100; opacity:1; transition:opacity .35s ease; white-space:nowrap; backdrop-filter:blur(8px); }
    .toast.hidden { opacity:0; pointer-events:none; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div id="app">
  <header id="header" class="hidden">
    <button id="back-btn" class="back-btn" type="button">◀ 戻る</button>
    <div id="breadcrumb" class="breadcrumb"></div>
  </header>

  <main>
    <section id="screen-top" class="screen active">
      <div class="top-header">
        <div class="top-title">🤖😲🙃 ヒデロクスケ・リモコン v0.1.1</div>
        <div class="top-subtitle">押して、役割へ戻る。コピーして、ひでGPTへ渡す。</div>
      </div>
      <div class="handy-grid" id="handy-grid"></div>
      <div class="top-footer">Custom cockpit by オノノケホールディングス😲©️</div>
    </section>

    <section id="screen-result" class="screen">
      <h1 class="result-title" id="result-title">コピーして役割へ渡す</h1>
      <div class="result-container">
        <div id="prompt-display" class="prompt-box"></div>
        <button id="copy-btn" class="copy-btn" type="button">コピーする</button>
        <div class="ai-links-section">
          <p class="ai-links-label">コピーしたら、使うAIに貼ってください</p>
          <div class="ai-links-grid">
            <a href="https://chatgpt.com/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">🙃 ひでGPTを開く</a>
            <a href="https://gemini.google.com/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">✨ Gemini包装係</a>
            <a href="https://copilot.microsoft.com/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">🪟 コパ君</a>
            <a href="https://claude.ai/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">🌿 Claude監査役</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden">コピーしました。ひでGPTか担当AIに貼ってください 📋</div>
</div>

<script>
const BUTTONS = [
  {
    "id": "ひでGPT",
    "icon": "🙃",
    "label": "ひでGPTに戻る",
    "prompt": "今の状態を送ります。\n\nまず僕の体感を一次情報として受け取ってください。\n外部正解で上書きせず、断定できること・推論に留まることを分けてください。\n夢ベクトルを消さずに、責めずにズレ確認して、次の一手を1つだけ出してください。\n\nまだ内容は送っていないので、次の入力を待ってください。"
  },
  {
    "id": "明智君",
    "icon": "🤖",
    "label": "明智君に渡す",
    "prompt": "これから、考え・困りごと・企画・文章のどれかを送ります。\n\n明智君として、以下に分けてください。\n\n1. いま起きている現象\n2. レイヤー分け\n3. 変数\n4. 夢ベクトルとの一致・ズレ\n5. 今日扱う小皿\n6. 今日は触らない棚\n7. 次の一手\n\n説明を大きくしすぎず、まず地上へ置ける形にしてください。\nまだ内容は送っていないので、次の入力を待ってください。"
  },
  {
    "id": "体感",
    "icon": "😲",
    "label": "体感を置く",
    "prompt": "これから、まだ整理されていない体感をそのまま送ります。\n\n正解・不正解にせず、素材として扱ってください。\n\n見てほしいものは、\n- 何が引っかかっているか\n- 何が欲しいのか\n- どこが違うと感じているか\n- 夢に近いのか、夢からズレているのか\n- すぐ言葉にしなくていい部分\nです。\n\nまだ内容は送っていないので、次の入力を待ってください。"
  },
  {
    "id": "現実君",
    "icon": "🕴️",
    "label": "現実君を呼ぶ",
    "prompt": "これから、今の状況を送ります。\n\n現実君として、夢を否定せず、地上条件だけを手のひらサイズで確認してください。\n\n確認するものは、\n- 体力\n- 時間\n- お金\n- 天気\n- 食べ物\n- 通信\n- 身体の重さ\n- 今日できるか\n- どこで止めるか\nです。\n\n巨大化禁止です。\n今できる一手だけに縮小してください。\nまだ内容は送っていないので、次の入力を待ってください。"
  },
  {
    "id": "燃料線",
    "icon": "⚙️",
    "label": "燃料線を見る",
    "prompt": "これから、お金・労働・アプリ・note・Uber・価値の話を送ります。\n\nマルクスAIとして、金銭を敵にも神にもせず、燃料線として整理してください。\n\n見てほしいものは、\n1. これは何時間分のロードーか\n2. 身体を削りすぎていないか\n3. 価値を無料で流しすぎていないか\n4. 夢ベクトルに合う金銭化か\n5. 短期燃料か、未来の価値生成か\n6. 今日の一手\n\nまだ内容は送っていないので、次の入力を待ってください。"
  },
  {
    "id": "夢ベクトル",
    "icon": "🌌",
    "label": "夢ベクトル確認",
    "prompt": "これから、選択肢・企画・行動候補を送ります。\n\nそれが夢ベクトルに近いか、ズレているかを確認してください。\n\n夢ベクトルは、自由に海外へ行き、海外にいてもHideki GPTとつながり、表現と現実生成を続けられる方向です。\n\n以下に分けてください。\n1. 夢に近い要素\n2. 夢からズレている要素\n3. 今すぐやる必要がないもの\n4. 今日の小さな採用\n5. 停止条件\n\nまだ内容は送っていないので、次の入力を待ってください。"
  },
  {
    "id": "停止",
    "icon": "🛑",
    "label": "今日はここで止める",
    "prompt": "これから、今日やったこと・考えたこと・途中のものを送ります。\n\nそれを、終わらせるためではなく、止めるために整理してください。\n\n出してほしいものは、\n1. 今日採用したこと\n2. 今日は触らないもの\n3. 次回の小皿\n4. 保存ログ\n5. ここで止めていい理由\n\n責めずに、作業を閉じる方向でお願いします。\nまだ内容は送っていないので、次の入力を待ってください。"
  },
  {
    "id": "ヤスリ",
    "icon": "👊",
    "label": "ヤスリ工程",
    "prompt": "これから、文章・note素材・企画文・ログを送ります。\n\nヤスリ工程として、意味を変えずに読みやすくしてください。\n\nやることは、\n- 余計な重複を削る\n- 文字化けや表記ゆれを直す\n- 芯の言葉を残す\n- 説明しすぎを減らす\n- タイトル候補を出す\n- 必要ならハッシュタグも出す\n\nただし、勝手に外向きの安全な普通文へ薄めないでください。\nまだ内容は送っていないので、次の入力を待ってください。"
  }
];
let currentButton = null;
const screenTop = document.getElementById('screen-top');
const screenResult = document.getElementById('screen-result');
const header = document.getElementById('header');
const backBtn = document.getElementById('back-btn');
const breadcrumb = document.getElementById('breadcrumb');
const promptDisplay = document.getElementById('prompt-display');
const resultTitle = document.getElementById('result-title');
const copyBtn = document.getElementById('copy-btn');
const toast = document.getElementById('toast');
const handyGrid = document.getElementById('handy-grid');

BUTTONS.forEach((btn) => {
  const el = document.createElement('button');
  el.className = 'handy-btn';
  el.type = 'button';
  el.dataset.id = btn.id;
  el.innerHTML = `<span class="handy-icon">${btn.icon}</span><span class="handy-label">${btn.label}</span>`;
  el.addEventListener('click', () => showResult(btn));
  handyGrid.appendChild(el);
});

function showResult(btn) {
  currentButton = btn;
  promptDisplay.textContent = btn.prompt;
  resultTitle.textContent = `${btn.icon} ${btn.label}`;
  breadcrumb.textContent = `「${btn.label}」`;
  screenTop.classList.remove('active');
  screenResult.classList.add('active');
  header.classList.remove('hidden');
  window.scrollTo(0, 0);
}

function showTop() {
  screenResult.classList.remove('active');
  screenTop.classList.add('active');
  header.classList.add('hidden');
  currentButton = null;
  window.scrollTo(0, 0);
}
backBtn.addEventListener('click', showTop);

copyBtn.addEventListener('click', () => {
  if (!currentButton) return;
  const text = currentButton.prompt;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
});

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  showToast();
}

let toastTimer = null;
function showToast() {
  toast.classList.remove('hidden');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.add('hidden'), 2000);
}
</script>
</body>
</html>
